name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # AI 분류 결과를 소스에 커밋백하기 위해 write
  models: read      # GitHub Models(무료 추론) 사용
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: AI 자동 분류 (GitHub Models, cluster 비어있는 노트)
        run: node scripts/categorize.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: 분류 결과 커밋백
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "변경 없음 (분류할 노트 없거나 호출 실패)"
          else
            git config user.name "study-city-bot"
            git config user.email "actions@users.noreply.github.com"
            git commit -m "chore: AI 자동 분류 [skip ci]"
            git push
          fi

      - name: Build (base=/study-city/)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
